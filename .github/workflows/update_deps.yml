name: Update dependencies

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update_deps:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      GH_PAT: ${{ secrets.GH_UPDATE_DEPS_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        run: |
          echo "$GH_PAT" | gh auth login --with-token

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate dependency config
        run: |
          python scripts/generate_config.py

      - name: Check repo is in dep-config
        id: dep_config
        run: |
          if [[ ! -f dep-config.json ]]; then
            echo "dep-config.json not found; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if jq -e --arg name "$REPO_NAME" 'has($name)' dep-config.json >/dev/null 2>&1; then
            echo "Found $REPO_NAME in dep-config.json."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Repository $REPO_NAME not in dep-config.json; skipping remaining steps."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodules
        if: steps.dep_config.outputs.skip == 'false' 
        run: |
          set -e

          DEPENDENTS = $(jq -c ".\"$REPO_NAME\".dependents" dep-config.json)

          for dep in $DEPENDENTS; do
            TARGET = $(echo $dep | jq -r '.repo')
            TYPE = $(echo $dep | jq -r '.type')

            if [[ "$TYPE" == "submodule" ]]; then
              echo "Update dependency (type: submodule)"
              PATH = $(echo $dep | jq -r '.path')

              git clone https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git target-repo
              cd target-repo

              gh auth login --with-token <<< "$GH_PAT"

              BASE = $(gh repo view --json defaultBranchRef -q .defaultBranchRef.name)

              NEW_BRANCH = "update-${REPO_NAME}-$(echo $GITHUB_SHA | cut -c1-7)"
              git checkout -b "$NEW_BRANCH"
              git submodule update --init --recursive

              cd "$PATH"
              git fetch origin
              git checkout $GITHUB_SHA
              cd -

              git add "$PATH"

              if ! git diff --cached --quiet; then
                git config user.name "github-actions-update-deps-bot"
                git config user.email "github-actions-update-deps-bot@github.com"

                git commit -m "chore: update dependency $REPO_NAME to $(echo $GITHUB_SHA | cut -c1-7)"
                git push origin "$NEW_BRANCH"

                gh pr create \
                  --title "Update $REPO_NAME submodule"
                  --body "Automated update of submodule \`$REPO_NAME\` to commit \`$GITHUB_SHA\` generated by GitHub Actions @Team-Deepiri/support-team" \
                  --base "$BASE" \
                  --head "$NEW_BRANCH" \

              else
                echo "No changes to commit"
              fi

              cd ..
              rm -rf target-repo
              
            elif [[ "$TYPE" == "npm" ]]; then
              echo "Update dependency (type: npm)"
            elif [[ "$TYPE" == "python" ]]; then
              echo "Update dependency (type: python)"
          done
