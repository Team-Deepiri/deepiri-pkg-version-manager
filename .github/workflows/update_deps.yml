name: Update dependencies (centralized)

on:
  repository_dispatch:
    types: [dependency_update]

permissions:
  contents: read

jobs:
  update_deps:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.client_payload.repo }}
      COMMIT_SHA: ${{ github.event.client_payload.sha }}
      TAG_NAME: ${{ github.event.client_payload.tag }}
      GH_PAT: ${{ secrets.GH_UPDATE_DEPS_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        run: |
          echo "$GH_PAT" | gh auth login --with-token

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate dependency config
        run: |
          python scripts/generate_config.py

      - name: Check repo is in dep-config
        id: dep_config
        run: |
          if [[ ! -f dep-config.json ]]; then
            echo "dep-config.json not found; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if jq -e --arg name "$REPO_NAME" 'has($name)' dep-config.json >/dev/null 2>&1; then
            echo "Found $REPO_NAME in dep-config.json."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Repository $REPO_NAME not in dep-config.json; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodules
        if: steps.dep_config.outputs.skip == 'false'
        run: |
          set -e

          DEPENDENTS=$(jq -c ".\"$REPO_NAME\".dependents[]" dep-config.json)

          for dep in $DEPENDENTS; do
            TARGET=$(echo $dep | jq -r '.repo')
            TYPE=$(echo $dep | jq -r '.type')

            if [[ "$TYPE" == "submodule" ]]; then
              echo "Updating submodule in $TARGET"

              PATH=$(echo $dep | jq -r '.path')

              git clone https://x-access-token:${GH_PAT}@github.com/${TARGET}.git target-repo
              cd target-repo

              BASE=$(gh repo view --json defaultBranchRef -q .defaultBranchRef.name)

              NEW_BRANCH="update-${REPO_NAME}-$(echo $COMMIT_SHA | cut -c1-7)"
              git checkout -b "$NEW_BRANCH"

              git submodule update --init --recursive

              cd "$PATH"
              git fetch origin

              # Prefer tag if provided, fallback to commit
              if [[ -n "$TAG_NAME" && "$TAG_NAME" != "null" ]]; then
                git checkout "$TAG_NAME"
              else
                git checkout "$COMMIT_SHA"
              fi

              cd -

              git add "$PATH"

              if ! git diff --cached --quiet; then
                git config user.name "github-actions-update-deps-bot"
                git config user.email "github-actions-update-deps-bot@github.com"

                if [[ -n "$TAG_NAME" && "$TAG_NAME" != "null" ]]; then
                  VERSION="$TAG_NAME"
                else
                  VERSION=$(echo $COMMIT_SHA | cut -c1-7)
                fi

                git commit -m "chore: update dependency $REPO_NAME to $VERSION"
                git push origin "$NEW_BRANCH"

                gh pr create \
                  --title "Update $REPO_NAME dependency" \
                  --body "Automated update of \`$REPO_NAME\` to \`$VERSION\`" \
                  --base "$BASE" \
                  --head "$NEW_BRANCH"

              else
                echo "No changes to commit"
              fi

              cd ..
              rm -rf target-repo

            elif [[ "$TYPE" == "npm" ]]; then
              echo "TODO: npm update logic"
            elif [[ "$TYPE" == "python" ]]; then
              echo "TODO: python update logic"
            fi
          done